<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horse Creek Tavern | Drinks</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="site-frame">
    <header class="top-header">
      <a class="top-logo" href="food.html" aria-label="Horse Creek Tavern food menu">
        <img class="top-logo-image" src="assets/horse-creek-logo.png" alt="Horse Creek Tavern logo">
      </a>

      <nav class="menu-switcher" aria-label="Menu type">
        <a class="menu-switcher-link" href="food.html">Food</a>
        <a class="menu-switcher-link menu-switcher-link-active" href="drinks.html" aria-current="page">Drinks</a>
      </nav>
    </header>

    <main>
      <section class="hero-banner">
        <h1>Drinks</h1>
      </section>

      <section class="dropdown-list" aria-label="Drink menu sections">
        <details class="dropdown-card" id="beer">
          <summary>Beer</summary>
          <div class="dropdown-body">
            <div class="placeholder-slot">Coming soon</div>
          </div>
        </details>

        <details class="dropdown-card" id="wine">
          <summary>Wine</summary>
          <div class="dropdown-body">
            <div class="placeholder-slot">Coming soon</div>
          </div>
        </details>

        <details class="dropdown-card" id="liquor">
          <summary>Liquor</summary>
          <div class="dropdown-body">
            <div class="placeholder-slot">Coming soon</div>
          </div>
        </details>
      </section>
    </main>
  </div>
</body>
</html>
